<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0f1e">
<title>Journal — OBSCURO</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--noir:#0a0f1e;--noir2:#0d1b3e;--acier:#1a3a6e;
--bleu:#5b8fd4;--glace:#b8cee8;--blanc:#e8f0f8;
--font-titre:'Cinzel',serif;--font-corps:'Montserrat',sans-serif;
}
html,body{min-height:100%;background:var(--noir);color:var(--blanc);font-family:var(--font-corps)}
nav{position:fixed;top:0;width:100%;background:rgba(10,15,30,0.92);backdrop-filter:blur(12px);z-index:100;border-bottom:1px solid rgba(91,143,212,0.15)}
.nav-inner{max-width:960px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:var(--font-titre);font-size:1.1rem;letter-spacing:0.2em;color:var(--glace);text-decoration:none}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{text-decoration:none;color:var(--glace);opacity:0.6;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;transition:opacity 0.3s}
.nav-links a:hover,.nav-links a.active{opacity:1}
.page{max-width:960px;margin:0 auto;padding:100px 24px 80px}
.page-header{margin-bottom:64px}
.page-icon{font-size:2rem;margin-bottom:20px;opacity:0.7}
.page-label{font-size:0.7rem;letter-spacing:0.35em;text-transform:uppercase;color:var(--bleu);margin-bottom:12px;opacity:0.7}
.page-titre{font-family:var(--font-titre);font-size:clamp(1.8rem,5vw,2.8rem);letter-spacing:0.1em;color:var(--blanc);margin-bottom:16px}
.page-desc{font-size:0.9rem;line-height:1.8;color:var(--glace);opacity:0.55;font-weight:300;max-width:560px}
/* FORMULAIRE */
.form-section{background:rgba(13,27,62,0.5);border:1px solid rgba(91,143,212,0.15);padding:40px;margin-bottom:64px}
.form-titre{font-family:var(--font-titre);font-size:0.9rem;letter-spacing:0.2em;color:var(--glace);margin-bottom:32px;opacity:0.7;text-transform:uppercase}
.form-grid{display:grid;gap:20px}
.form-group{display:flex;flex-direction:column;gap:8px}
.form-label{font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--bleu);opacity:0.8}
.form-input,.form-textarea{background:rgba(10,15,30,0.8);border:1px solid rgba(91,143,212,0.2);color:var(--blanc);font-family:var(--font-corps);font-size:0.85rem;padding:14px 16px;outline:none;transition:border-color 0.3s;resize:vertical}
.form-input:focus,.form-textarea:focus{border-color:rgba(91,143,212,0.6)}
.form-textarea{min-height:90px;line-height:1.7}
.form-actions{display:flex;gap:16px;margin-top:8px}
.btn{padding:13px 32px;border:1px solid rgba(91,143,212,0.4);background:transparent;color:var(--glace);font-family:var(--font-corps);font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;transition:all 0.3s}
.btn:hover{background:rgba(91,143,212,0.12);border-color:var(--bleu)}
.btn-primary{background:rgba(26,58,110,0.6);border-color:var(--bleu)}
.btn-danger{border-color:rgba(212,91,91,0.4);color:rgba(212,150,150,0.8);font-size:0.65rem;padding:8px 16px}
.btn-danger:hover{background:rgba(212,91,91,0.1);border-color:rgba(212,91,91,0.7)}
/* STATS */
.stats-bar{display:flex;gap:32px;margin-bottom:48px;padding:24px;border:1px solid rgba(91,143,212,0.1);background:rgba(13,27,62,0.3)}
.stat{text-align:center}
.stat-num{font-family:var(--font-titre);font-size:1.8rem;color:var(--bleu);line-height:1}
.stat-label{font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--glace);opacity:0.4;margin-top:6px}
/* ENTREES */
.entries-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
.entries-titre{font-family:var(--font-titre);font-size:0.85rem;letter-spacing:0.2em;color:var(--glace);opacity:0.6;text-transform:uppercase}
.entries-count{font-size:0.75rem;color:var(--bleu);opacity:0.7}
.entry{border:1px solid rgba(91,143,212,0.1);margin-bottom:2px;transition:border-color 0.3s}
.entry:hover{border-color:rgba(91,143,212,0.3)}
.entry-header{padding:24px 28px;cursor:pointer;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.entry-meta{display:flex;align-items:center;gap:16px;margin-bottom:8px}
.entry-num{font-family:var(--font-titre);font-size:0.75rem;color:var(--bleu);opacity:0.6;letter-spacing:0.1em}
.entry-tag{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--glace);opacity:0.35;border:1px solid rgba(184,206,232,0.15);padding:3px 8px}
.entry-date{font-size:0.65rem;color:var(--glace);opacity:0.25;margin-left:auto}
.entry-titre{font-family:var(--font-titre);font-size:1rem;letter-spacing:0.05em;color:var(--blanc)}
.entry-chevron{color:var(--bleu);opacity:0.4;font-size:0.8rem;flex-shrink:0;transition:transform 0.3s}
.entry.open .entry-chevron{transform:rotate(180deg)}
.entry-body{display:none;padding:0 28px 28px;border-top:1px solid rgba(91,143,212,0.08)}
.entry.open .entry-body{display:block}
.entry-section{margin-top:24px}
.entry-section-label{font-size:0.65rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--bleu);opacity:0.6;margin-bottom:10px}
.entry-section-text{font-size:0.88rem;line-height:1.85;color:var(--glace);opacity:0.7;font-weight:300}
.entry-lecon{font-size:0.85rem;line-height:1.85;color:var(--glace);opacity:0.55;font-style:italic;border-left:2px solid rgba(91,143,212,0.3);padding-left:16px}
.entry-actions{margin-top:20px;display:flex;justify-content:flex-end}
.empty-state{text-align:center;padding:80px 24px;opacity:0.3}
.empty-icon{font-size:2rem;margin-bottom:16px}
.empty-text{font-size:0.85rem;letter-spacing:0.1em;color:var(--glace)}
footer{padding:48px 24px;text-align:center;border-top:1px solid rgba(91,143,212,0.08);margin-top:80px}
.footer-logo{font-family:var(--font-titre);font-size:1rem;letter-spacing:0.3em;color:var(--glace);opacity:0.3;margin-bottom:12px}
.footer-sub{font-size:0.7rem;letter-spacing:0.2em;color:var(--glace);opacity:0.2;text-transform:uppercase}
@media(max-width:600px){
.stats-bar{gap:16px}.form-section{padding:24px}
.entry-header{padding:20px}.entry-body{padding:0 20px 20px}
}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">OBSCURO</a>
    <ul class="nav-links">
      <li><a href="index.html">Doctrine</a></li>
      <li><a href="protocoles.html">Protocoles</a></li>
      <li><a href="citations.html">Citations</a></li>
      <li><a href="journal.html" class="active">Journal</a></li>
    </ul>
  </div>
</nav>
<div class="page">
  <div class="page-header">
    <div class="page-icon">🗡️</div>
    <p class="page-label">Maîtrise intime</p>
    <h1 class="page-titre">Journal</h1>
    <p class="page-desc">Les situations réelles, les réponses choisies, les leçons tirées. Ce journal est un miroir, pas une confession.</p>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Entrées</div></div>
    <div class="stat"><div class="stat-num" id="stat-mois">0</div><div class="stat-label">Ce mois</div></div>
    <div class="stat"><div class="stat-num" id="stat-streak">0</div><div class="stat-label">Jours actifs</div></div>
  </div>
  <div class="form-section">
    <div class="form-titre">Nouvelle entrée</div>
    <div class="form-grid">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <div class="form-group">
          <label class="form-label">Titre de la situation</label>
          <input class="form-input" id="f-titre" placeholder="Ex: La remarque en public" type="text">
        </div>
        <div class="form-group">
          <label class="form-label">Catégorie</label>
          <input class="form-input" id="f-tag" placeholder="Ex: Provocation · Silence" type="text">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">La situation</label>
        <textarea class="form-textarea" id="f-situation" placeholder="Décris la situation avec précision — le contexte, la pression, ce qui s'est passé."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">La réponse choisie</label>
        <textarea class="form-textarea" id="f-reponse" placeholder="Qu'as-tu fait ? Qu'as-tu dit — ou tu n'as pas dit ?"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">La leçon</label>
        <textarea class="form-textarea" id="f-lecon" placeholder="Ce que tu retiens. Ce que tu ferais différemment. Ce que tu as compris."></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveEntry()">Inscrire dans l'ombre</button>
      <button class="btn" onclick="clearForm()">Effacer</button>
    </div>
  </div>
  <div class="entries-header">
    <span class="entries-titre">Chroniques</span>
    <span class="entries-count" id="entries-count"></span>
  </div>
  <div id="entries-list"></div>
</div>
<footer>
  <div class="footer-logo">OBSCURO</div>
  <div class="footer-sub">Macdubh — Fils du Noir</div>
</footer>
<script>
const STORAGE_KEY = 'obscuro_journal';
const STATIC = [
  {id:'s1',titre:'La remarque en public',tag:'Provocation',date:'2024-01-01',situation:'Quelqu\'un tente de me diminuer devant d\'autres. La pique est précise, calculée pour provoquer une réaction visible. Les regards se tournent vers moi. L\'attente est palpable.',reponse:'Le silence. Trois secondes de regard direct, calme, sans hostilité. Puis la conversation reprend sur autre chose — comme si les mots n\'avaient pas atteint leur cible. Ce qu\'ils n\'ont pas fait.',lecon:'La provocation ne vit que si tu lui donnes de l\'air. Le silence l\'étouffe. Réagir, c\'est confirmer que la flèche a touché. Ne pas réagir, c\'est être blindé.'},
  {id:'s2',titre:'L\'injustice silencieuse',tag:'Colère retenue',date:'2024-01-02',situation:'Une décision injuste est prise. Je sais qu\'elle est injuste. Je sens la colère monter — cette chaleur dans la poitrine qui veut parler avant que le cerveau soit prêt.',reponse:'Inspection intérieure. J\'identifie l\'émotion, je la nomme : "c\'est de la colère". La nommer suffit à créer une distance. J\'attends. Je réserve ma réponse pour un moment choisi — pas subi.',lecon:'Nommer une émotion lui retire une partie de son pouvoir. L\'aigle ne fond pas quand il fait chaud — il choisit le moment de sa descente.'},
  {id:'s3',titre:'Le groupe qui attend',tag:'Pression sociale',date:'2024-01-03',situation:'Tout le monde autour de moi prend une position. La pression implicite est là : sois comme nous, rejoins le mouvement, prononce-toi. Le silence commence à peser.',reponse:'Je n\'ai pas parlé. Non par lâcheté — mais parce que je n\'avais pas encore décidé ce que je pensais vraiment. Et un homme qui parle avant d\'avoir pensé est un homme manipulable.',lecon:'L\'appartenance au groupe est une drogue douce. Elle te fait parler avant de penser, agir avant de choisir. L\'aigle n\'appartient à aucun troupeau.'},
  {id:'s4',titre:'La chute sans spectateur',tag:'Échec · Rebond',date:'2024-01-04',situation:'J\'ai échoué sur quelque chose qui comptait. Pas d\'excuse extérieure valable — c\'était ma responsabilité et je ne suis pas à la hauteur. La tentation de la rumination est forte.',reponse:'J\'ai accepté l\'échec. Regardé en face, sans minimiser. Puis j\'ai posé une seule question : qu\'est-ce que je ferai différemment ? Une réponse. Une seule. Et le lendemain, recommencer.',lecon:'L\'aigle qui tombe ne reste pas sur le sol à contempler sa chute. Il évalue, il ajuste, il reprend de l\'altitude. La nuit n\'est pas une punition — c\'est le terrain de ceux qui voient dans l\'obscurité.'}
];
function load(){return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}
function save(e){localStorage.setItem(STORAGE_KEY,JSON.stringify(e))}
function fmt(d){return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})}
function allEntries(){
  const user=load();
  return [...user,...STATIC];
}
function updateStats(){
  const user=load();
  document.getElementById('stat-total').textContent=user.length+STATIC.length;
  const now=new Date();
  const mois=user.filter(e=>{const d=new Date(e.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()}).length;
  document.getElementById('stat-mois').textContent=mois;
  const days=new Set(user.map(e=>e.date.split('T')[0])).size;
  document.getElementById('stat-streak').textContent=days;
  const total=user.length+STATIC.length;
  document.getElementById('entries-count').textContent=total+' entrée'+(total>1?'s':'');
}
function renderEntries(){
  const all=allEntries();
  const list=document.getElementById('entries-list');
  if(!all.length){
    list.innerHTML='<div class="empty-state"><div class="empty-icon">🗡️</div><div class="empty-text">Aucune entrée — le miroir attend.</div></div>';
    return;
  }
  list.innerHTML=all.map((e,i)=>`
    <div class="entry" id="entry-${e.id}">
      <div class="entry-header" onclick="toggle('${e.id}')">
        <div>
          <div class="entry-meta">
            <span class="entry-num">${String(i+1).padStart(2,'0')}</span>
            ${e.tag?`<span class="entry-tag">${e.tag}</span>`:''}
            <span class="entry-date">${fmt(e.date)}</span>
          </div>
          <div class="entry-titre">${e.titre}</div>
        </div>
        <span class="entry-chevron">▼</span>
      </div>
      <div class="entry-body">
        <div class="entry-section">
          <div class="entry-section-label">Situation</div>
          <div class="entry-section-text">${e.situation}</div>
        </div>
        <div class="entry-section">
          <div class="entry-section-label">Réponse choisie</div>
          <div class="entry-section-text">${e.reponse}</div>
        </div>
        <div class="entry-section">
          <div class="entry-section-label">Leçon</div>
          <div class="entry-lecon">${e.lecon}</div>
        </div>
        ${!e.id.startsWith('s')?`<div class="entry-actions"><button class="btn btn-danger" onclick="deleteEntry('${e.id}')">Supprimer</button></div>`:''}
      </div>
    </div>
  `).join('');
}
function toggle(id){
  const el=document.getElementById('entry-'+id);
  el.classList.toggle('open');
}
function saveEntry(){
  const titre=document.getElementById('f-titre').value.trim();
  const tag=document.getElementById('f-tag').value.trim();
  const situation=document.getElementById('f-situation').value.trim();
  const reponse=document.getElementById('f-reponse').value.trim();
  const lecon=document.getElementById('f-lecon').value.trim();
  if(!titre||!situation||!reponse||!lecon){alert('Remplis tous les champs.');return;}
  const entries=load();
  entries.unshift({id:'u'+Date.now(),titre,tag,date:new Date().toISOString(),situation,reponse,lecon});
  save(entries);
  clearForm();
  renderEntries();
  updateStats();
}
function clearForm(){
  ['f-titre','f-tag','f-situation','f-reponse','f-lecon'].forEach(id=>document.getElementById(id).value='');
}
function deleteEntry(id){
  if(!confirm('Supprimer cette entrée ?'))return;
  const entries=load().filter(e=>e.id!==id);
  save(entries);
  renderEntries();
  updateStats();
}
renderEntries();
updateStats();
</script>
</body>
</html>
